  .game-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

  .streak-dot.miss { background: var(--wrong); border-color: var(--wrong); box-shadow: 0 0 6px rgba(227,53,13,0.5); }

  .arena { display: grid; grid-template-columns: 1fr 44px 1fr; gap: 10px; align-items: center; margin-bottom: 14px; }
  .poke-card { background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: var(--radius); padding: 18px 10px 14px; text-align: center; transition: border-color 0.3s, box-shadow 0.3s; min-height: 210px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .poke-card.correct { border-color: var(--correct); box-shadow: 0 0 20px rgba(76,175,80,0.25); }
  .poke-card.wrong { border-color: var(--wrong); box-shadow: 0 0 20px rgba(227,53,13,0.25); }
  .poke-card-label { position: absolute; top: 8px; left: 10px; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .mega-badge { position: absolute; top: 8px; right: 10px; font-size: 9px; padding: 2px 6px; background: rgba(163,115,255,0.2); border: 1px solid rgba(163,115,255,0.5); border-radius: 10px; color: #c89fff; letter-spacing: 0.5px; }

  .poke-sprite-wrap { width: 88px; height: 88px; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius: 50%; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; }
  .poke-sprite { width: 80px; height: 80px; image-rendering: pixelated; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }

  .speed-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }

const FILTERS = [
  {key:'all', label:'전체'},
  {key:'normal', label:'일반'},
  {key:'mega', label:'메가진화'},
  {key:'fast', label:'빠른 포켓몬'},
  {key:'slow', label:'느린 포켓몬'},
];

let activeFilter = 'all', leftP, rightP, score, totalQ, best, history, answered;

// 필터 버튼 JS로 생성 (티스토리 onclick 제거 문제 방지)
(function buildFilters() {
  const row = document.getElementById('filterRow');
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f.key === 'all' ? ' active' : '');
    btn.textContent = f.label;
    btn.addEventListener('click', () => setFilter(f.key, btn));
    row.appendChild(btn);
  });
})();

document.getElementById('btnUp').addEventListener('click', () => guess(true));
document.getElementById('btnDown').addEventListener('click', () => guess(false));
document.getElementById('btnRestart').addEventListener('click', () => startGame());

function spriteUrl(name) {
  const id = ID_MAP[name];
  if (!id) return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png';
  return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + id + '.png';
}

function getTier(spd) {
  if (spd >= 120) return {label:'최상위권', color:'#ff6b6b'};
  if (spd >= 100) return {label:'상위권', color:'#ffa94d'};
  if (spd >= 80)  return {label:'중상위권', color:'#ffd43b'};
  if (spd >= 60)  return {label:'중위권', color:'#69db7c'};
  return {label:'하위권', color:'#74c0fc'};
}

function getPool() {
  if (activeFilter === 'mega') return DB.filter(p => p.mega);
  if (activeFilter === 'normal') return DB.filter(p => !p.mega);
  if (activeFilter === 'fast') return DB.filter(p => p.speed >= 100);
  if (activeFilter === 'slow') return DB.filter(p => p.speed < 60);
  return DB;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  startGame();
}

function pick(exclude) {
  const pool = getPool().filter(p => !exclude || p.name !== exclude.name);
  return pool[Math.floor(Math.random() * pool.length)];
}

function renderCard(side, poke, hideSpeed) {
  document.getElementById('sprite' + side).src = spriteUrl(poke.name);
  document.getElementById('sprite' + side).alt = poke.name;
  document.getElementById('name' + side).textContent = poke.name;
  document.getElementById('megaBadge' + side).style.display = poke.mega ? '' : 'none';
  const sv = document.getElementById('speed' + side);
  const tier = getTier(poke.speed);
  if (hideSpeed) {
    sv.className = 'speed-hidden'; sv.textContent = '???';
    document.getElementById('tier' + side).textContent = '';
  } else {
    sv.className = 'speed-val'; sv.textContent = poke.speed;
    document.getElementById('tier' + side).textContent = tier.label;
    document.getElementById('tier' + side).style.color = tier.color;
  }
  document.getElementById('card' + side).className = 'poke-card';
}

function renderStreak() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  const total = Math.max(history.length, 10);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i < history.length ? (history[i] ? ' hit' : ' miss') : '');
    row.appendChild(d);
  }
}

function startGame() {
  score = 0; totalQ = 0; history = []; answered = false;
  best = parseInt(localStorage.getItem('pkSpeedBest3') || '0');
  document.getElementById('score').textContent = 0;
  document.getElementById('total').textContent = 0;
  document.getElementById('best').textContent = best;
  document.getElementById('resultMsg').textContent = '오른쪽 포켓몬의 스피드가 더 높을까요, 낮을까요?';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('gameoverScreen').classList.remove('show');
  document.getElementById('arena').style.display = '';
  document.getElementById('btnGroup').style.display = '';
  renderStreak();
  leftP = pick(null);
  rightP = pick(leftP);
  renderCard('L', leftP, false);
  renderCard('R', rightP, true);
}

function guess(higher) {
  if (answered) return;
  answered = true;
  totalQ++;
  document.getElementById('total').textContent = totalQ;
  const correct = higher ? rightP.speed >= leftP.speed : rightP.speed <= leftP.speed;
  const tie = rightP.speed === leftP.speed;
  renderCard('R', rightP, false);
  const msg = document.getElementById('resultMsg');
  if (correct) {
    score++;
    history.push(true);
    if (score > best) {
      best = score;
      localStorage.setItem('pkSpeedBest3', best);
      document.getElementById('best').textContent = best;
    }
    document.getElementById('score').textContent = score;
    document.getElementById('cardR').classList.add('correct');
    msg.textContent = tie ? '동점! (둘 다 ' + leftP.speed + ') 정답 처리!' : '정답! ' + rightP.name + '의 스피드 ' + rightP.speed;
    msg.className = 'result-msg correct';
    renderStreak();
    setTimeout(function() {
      leftP = rightP; rightP = pick(leftP);
      renderCard('L', leftP, false);
      renderCard('R', rightP, true);
      msg.textContent = '오른쪽 포켓몬의 스피드가 더 높을까요, 낮을까요?';
      msg.className = 'result-msg';
      answered = false;
    }, 1300);
  } else {
    history.push(false);
    document.getElementById('cardR').classList.add('wrong');
    document.getElementById('cardL').classList.add('correct');
    msg.textContent = '틀렸어요! ' + rightP.name + '의 스피드는 ' + rightP.speed;
    msg.className = 'result-msg wrong';
    renderStreak();
    setTimeout(function() {
      document.getElementById('arena').style.display = 'none';
      document.getElementById('btnGroup').style.display = 'none';
      document.getElementById('goScore').textContent = score;
      document.getElementById('goDetail').innerHTML =
        '총 ' + totalQ + '문제 중 ' + score + '개 정답<br>' +
        (score >= best && score > 0 ? '🏆 최고 기록 달성!' : '최고 기록: ' + best + '연속');
      document.getElementById('gameoverScreen').classList.add('show');
    }, 1200);
  }
}

startGame();
